<style>
  .scenery-header {
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 40%, #388E3C 70%, #43A047 100%);
    color: #fff; padding: 3.5rem 1.5rem;
    text-align: center; position: relative; overflow: hidden;
  }
  .scenery-header::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 20 L50 20 L38 30 L43 45 L30 35 L17 45 L22 30 L10 20 L25 20 Z' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .scenery-header h1 {
    font-size: 2rem; margin: 0.5rem 0; position: relative;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3); font-weight: 700;
  }
  .scenery-header p { position: relative; text-shadow: 0 1px 6px rgba(0,0,0,0.25); font-size: var(--font-md); }
  .scenery-header .scenery-badge {
    position: relative; display: inline-block;
    background: rgba(255,255,255,0.18); padding: 0.3rem 1.2rem;
    border-radius: 20px; font-size: var(--font-xs); margin-bottom: 1rem;
    backdrop-filter: blur(4px);
  }

  .gallery-section { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1rem; }
  .gallery-section h2 {
    font-size: 1.4rem; margin: 0 0 0.75rem;
    color: #2E7D32; border-left: 4px solid #43A047; padding-left: 1rem;
  }
  .gallery-section p { line-height: 2; font-size: var(--font-md); color: #444; text-indent: 2em; margin-bottom: 1.5rem; }

  /* ── Masonry grid ── */
  .masonry {
    column-count: 4; column-gap: 1rem;
    margin-top: 1.5rem;
  }
  .masonry .masonry-item {
    break-inside: avoid; margin-bottom: 1rem;
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: pointer;
    display: block;
    position: relative;
  }
  .masonry .masonry-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  }
  .masonry .masonry-item img {
    display: block; width: 100%; height: auto;
  }

  @media (max-width: 900px) { .masonry { column-count: 3; } }
  @media (max-width: 640px) { .masonry { column-count: 2; } }
  @media (max-width: 420px) { .masonry { column-count: 1; } }

  /* ── Lightbox ── */
  .lightbox-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .lightbox-overlay.open {
    opacity: 1; pointer-events: auto;
  }
  .lightbox-overlay img {
    max-width: 92vw; max-height: 90vh;
    border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    transform: scale(0.9); transition: transform 0.3s;
  }
  .lightbox-overlay.open img { transform: scale(1); }
  .lightbox-close {
    position: absolute; top: 1rem; right: 1.5rem;
    background: rgba(255,255,255,0.15); border: none;
    color: #fff; font-size: 1.8rem; cursor: pointer;
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.3); }
  .lightbox-counter {
    position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.75); font-size: var(--font-sm);
  }
</style>

<body>

<div class="breadcrumb" style="max-width: var(--max-width); margin: 0 auto; padding: 0 1rem;">

<div class="gallery-section">
  <h2>🌄 村中四时景</h2>
  <p>石垅溪村坐落在麻阳的青山绿水之间，四时之景不同，晨昏之趣各异。春天油菜花金黄遍野，夏日稻田绿浪翻涌，秋季红枫染遍山岗，冬日薄雾如纱轻笼村庄。我们用镜头记录下这里的每一个动人瞬间，与远方的你分享这片被时光温柔以待的土地。</p>

  <!-- Lightbox overlay -->
  <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="关闭">✕</button>
    <img src="" alt="" id="lightboxImg">
    <span class="lightbox-counter" id="lightboxCounter"></span>
  </div>

<script>
(function() {
  var total = 39;
  var basePath = './uploads/%E7%9F%B3%E5%9E%85%E9%A3%8E%E5%85%89/';
  var masonry = document.getElementById('masonryGallery');
  var html = '';

  for (var i = 1; i <= total; i++) {
    html +=
      '<div class="masonry-item" onclick="openLightbox(' + i + ')">' +
        '<img src="' + basePath + i + '.jpg" alt="石垅风光 ' + i + '" loading="lazy">' +
      '</div>';
  }
  masonry.innerHTML = html;
})();

var currentIdx = 0;
var totalImgs = 39;

function openLightbox(idx) {
  currentIdx = idx;
  var overlay = document.getElementById('lightbox');
  var img = document.getElementById('lightboxImg');
  var counter = document.getElementById('lightboxCounter');
  var basePath = './uploads/%E7%9F%B3%E5%9E%85%E9%A3%8E%E5%85%89/';
  img.src = basePath + idx + '.jpg';
  counter.textContent = idx + ' / ' + totalImgs;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  var overlay = document.getElementById('lightbox');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
  var overlay = document.getElementById('lightbox');
  if (!overlay.classList.contains('open')) return;
  if (e.key === 'Escape') { closeLightbox(); return; }
  if (e.key === 'ArrowLeft' && currentIdx > 1) { openLightbox(currentIdx - 1); return; }
  if (e.key === 'ArrowRight' && currentIdx < totalImgs) { openLightbox(currentIdx + 1); return; }
});
</script>
